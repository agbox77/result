<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Система учета мероприятий</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
}

h2 {
    margin-top: 30px;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}

button {
    margin-top: 10px;
    padding: 8px;
    background: #3f51b5;
    color: white;
    border: none;
}

.card {
    border: 1px solid #ddd;
    padding: 10px;
    margin-top: 10px;
}

.hidden { display:none; }

</style>
</head>

<body>

<div class="container">

<h1>Система учета мероприятий</h1>

<!-- ФОРМА -->
<h2>Создать мероприятие</h2>

<label>Тип:</label>
<select id="type" onchange="toggleType()">
<option value="">-- выбрать --</option>
<option value="external">Внешнее</option>
<option value="internal">Внутреннее</option>
</select>

<label>Дата:</label>
<input type="date" id="date">

<label>Название:</label>
<input type="text" id="title">

<label>Объединение:</label>
<input type="text" id="club">

<div id="external" class="hidden">
<label>Уровень:</label>
<select id="level">
<option>Городской</option>
<option>Региональный</option>
<option>Всероссийский</option>
<option>Международный</option>
</select>

<label>Участников:</label>
<input type="number" id="participants">

<h3>Результаты</h3>
<div id="results"></div>
<button onclick="addResult()">+ результат</button>
</div>

<div id="internal" class="hidden">
<label>Тип активности:</label>
<input type="text" id="activity">

<label>Участников:</label>
<input type="number" id="int_participants">
</div>

<button onclick="save()">Сохранить</button>

<!-- СПИСОК -->
<h2>Мои мероприятия</h2>
<div id="list"></div>

</div>

<script>

let editIndex = null;

function toggleType() {
    external.classList.add("hidden");
    internal.classList.add("hidden");

    if (type.value === "external") external.classList.remove("hidden");
    if (type.value === "internal") internal.classList.remove("hidden");
}

function addResult(data = {}) {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <input placeholder="Номинация" class="nom" value="${data.nomination||""}">
        
        <select class="rtype">
            <option value="grandprix">Гран-при</option>
            <option value="laureate">Лауреат</option>
            <option value="diploma">Дипломант</option>
            <option value="place">Место</option>
        </select>

        <select class="degree">
            <option value="">-</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select>

        <input type="number" class="count" placeholder="Кол-во" value="${data.count||""}">

        <button onclick="this.parentElement.remove()">Удалить</button>
    `;

    results.appendChild(div);
}

function getData() {
    let data = {
        type: type.value,
        date: date.value,
        title: title.value,
        club: club.value
    };

    if (type.value === "external") {
        data.level = level.value;
        data.participants = participants.value;
        data.results = [];

        document.querySelectorAll(".card").forEach(r => {
            data.results.push({
                nomination: r.querySelector(".nom").value,
                type: r.querySelector(".rtype").value,
                degree: r.querySelector(".degree").value,
                count: r.querySelector(".count").value
            });
        });
    }

    if (type.value === "internal") {
        data.activity = activity.value;
        data.participants = int_participants.value;
    }

    return data;
}

function save() {
    let data = getData();
    let arr = JSON.parse(localStorage.getItem("events") || "[]");

    if (editIndex !== null) {
        arr[editIndex] = data;
        editIndex = null;
    } else {
        arr.push(data);
    }

    localStorage.setItem("events", JSON.stringify(arr));
    render();
    reset();
}

function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    let arr = JSON.parse(localStorage.getItem("events") || "[]");

    arr.forEach((e, i) => {
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${e.title}</b><br>
            ${e.date} | ${e.type}<br>
            <button onclick="edit(${i})">Редактировать</button>
            <button onclick="removeItem(${i})">Удалить</button>
        `;

        list.appendChild(div);
    });
}

function edit(i) {
    let e = JSON.parse(localStorage.getItem("events"))[i];
    editIndex = i;

    type.value = e.type;
    toggleType();

    date.value = e.date;
    title.value = e.title;
    club.value = e.club;

    results.innerHTML = "";

    if (e.type === "external") {
        level.value = e.level;
        participants.value = e.participants;
        e.results.forEach(r => addResult(r));
    }

    if (e.type === "internal") {
        activity.value = e.activity;
        int_participants.value = e.participants;
    }
}

function removeItem(i) {
    let arr = JSON.parse(localStorage.getItem("events"));
    arr.splice(i,1);
    localStorage.setItem("events", JSON.stringify(arr));
    render();
}

function reset() {
    document.querySelectorAll("input").forEach(i => i.value="");
    results.innerHTML = "";
}

render();

</script>

</body>
</html>
