<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Отчет педагога</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 40px;
    background: #f5f5f5;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 800px;
    margin: auto;
}

h2 {
    margin-top: 20px;
}

label {
    display: block;
    margin-top: 10px;
}

input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}

.hidden {
    display: none;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
}
</style>

</head>
<body>

<div class="container">

<h1>Отчет о мероприятии</h1>

<!-- Выбор типа -->
<label>Тип отчета:</label>
<select id="reportType" onchange="toggleForm()">
    <option value="">-- Выберите --</option>
    <option value="external">Внешнее мероприятие (конкурс)</option>
    <option value="internal">Внутреннее мероприятие</option>
</select>

<!-- ================= ВНЕШНИЕ ================= -->
<div id="externalForm" class="hidden">

<h2>Основная информация</h2>
<label>Дата:</label>
<input type="date">

<label>Название мероприятия:</label>
<input type="text">

<label>Организатор:</label>
<input type="text">

<h2>Тип и уровень</h2>
<label>Тип участия:</label>
<select>
    <option>Конкурс</option>
    <option>Фестиваль</option>
    <option>Олимпиада</option>
    <option>Конференция</option>
</select>

<label>Уровень:</label>
<select>
    <option>Районный</option>
    <option>Городской</option>
    <option>Региональный</option>
    <option>Всероссийский</option>
    <option>Международный</option>
</select>

<h2>Участие</h2>
<label>Количество участников:</label>
<input type="number">

<label>Формат:</label>
<select>
    <option>Очный</option>
    <option>Дистанционный</option>
</select>

<h2>Результаты</h2>
<label>Место:</label>
<select>
    <option>1</option>
    <option>2</option>
    <option>3</option>
    <option>Лауреат</option>
    <option>Дипломант</option>
    <option>Участие</option>
</select>

<label>Количество призеров:</label>
<input type="number">

<h2>Дополнительно</h2>
<label>Ссылка:</label>
<input type="text">

<label>Комментарий:</label>
<textarea></textarea>

</div>

<!-- ================= ВНУТРЕННИЕ ================= -->
<div id="internalForm" class="hidden">

<h2>Основная информация</h2>
<label>Дата:</label>
<input type="date">

<label>Название мероприятия:</label>
<input type="text">

<h2>Тип мероприятия</h2>
<select>
    <option>Концерт</option>
    <option>Классный час</option>
    <option>Мастер-класс</option>
    <option>Выставка</option>
    <option>Родительское собрание</option>
</select>

<h2>Охват</h2>
<label>Количество участников:</label>
<input type="number">

<label>Категория:</label>
<select>
    <option>Дети</option>
    <option>Родители</option>
    <option>Смешанная</option>
</select>

<h2>Содержание</h2>
<label>Цель:</label>
<textarea></textarea>

<label>Описание:</label>
<textarea></textarea>

<h2>Результат</h2>
<label>Результат:</label>
<textarea></textarea>

<label>Выводы:</label>
<textarea></textarea>

</div>

<button onclick="submitForm()">Отправить</button>

</div>

<script>
function toggleForm() {
    const type = document.getElementById("reportType").value;

    document.getElementById("externalForm").classList.add("hidden");
    document.getElementById("internalForm").classList.add("hidden");

    if (type === "external") {
        document.getElementById("externalForm").classList.remove("hidden");
    }

    if (type === "internal") {
        document.getElementById("internalForm").classList.remove("hidden");
    }
}

function submitForm() {
    alert("Пока это прототип 🙂\nДанные можно будет отправлять на сервер позже.");
}
</script>

</body>
</html>
