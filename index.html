<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Система учета мероприятий</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
    margin: 0;
}

.container {
    max-width: 800px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

h1 {
    margin-bottom: 10px;
}

.section {
    margin-top: 20px;
}

label {
    display: block;
    margin-top: 10px;
    font-weight: 500;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}

button {
    margin-top: 15px;
    padding: 10px;
    border: none;
    background: #3f51b5;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

.result {
    border: 1px solid #ddd;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    background: #fafafa;
}

.hidden {
    display: none;
}

pre {
    background: #222;
    color: #0f0;
    padding: 10px;
    margin-top: 20px;
    overflow-x: auto;
}
</style>
</head>

<body>

<div class="container">

<h1>Создание мероприятия</h1>

<div class="section">
<label>Тип:</label>
<select id="type" onchange="toggleType()">
<option value="">-- выбрать --</option>
<option value="external">Внешнее</option>
<option value="internal">Внутреннее</option>
</select>

<label>Дата:</label>
<input type="date" id="date">

<label>Название:</label>
<input type="text" id="title">

<label>Объединение:</label>
<input type="text" id="club">
</div>

<!-- ВНЕШНЕЕ -->
<div id="external" class="hidden section">

<label>Уровень:</label>
<select id="level">
<option>Городской</option>
<option>Региональный</option>
<option>Всероссийский</option>
<option>Международный</option>
</select>

<label>Участников:</label>
<input type="number" id="participants">

<h3>Результаты</h3>
<div id="results"></div>

<button onclick="addResult()">+ добавить результат</button>

</div>

<!-- ВНУТРЕННЕЕ -->
<div id="internal" class="hidden section">

<label>Тип активности:</label>
<input type="text" id="activity">

<label>Участников:</label>
<input type="number" id="int_participants">

</div>

<button onclick="save()">Сохранить</button>

<pre id="output"></pre>

</div>

<script>

function toggleType() {
    external.classList.add("hidden");
    internal.classList.add("hidden");

    if (type.value === "external") external.classList.remove("hidden");
    if (type.value === "internal") internal.classList.remove("hidden");
}

function addResult() {
    const div = document.createElement("div");
    div.className = "result";

    div.innerHTML = `
        <label>Номинация</label>
        <input class="nom">

        <label>Тип результата</label>
        <select class="rtype">
            <option value="grandprix">Гран-при</option>
            <option value="laureate">Лауреат</option>
            <option value="diploma">Дипломант</option>
            <option value="place">Место</option>
        </select>

        <label>Степень</label>
        <select class="degree">
            <option value="">-</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select>

        <label>Количество</label>
        <input type="number" class="count">

        <button onclick="this.parentElement.remove()">Удалить</button>
    `;

    results.appendChild(div);
}

function save() {

    let data = {
        type: type.value,
        date: date.value,
        title: title.value,
        club: club.value
    };

    if (type.value === "external") {

        data.level = level.value;
        data.participants = participants.value;

        data.results = [];

        document.querySelectorAll(".result").forEach(r => {
            data.results.push({
                nomination: r.querySelector(".nom").value,
                type: r.querySelector(".rtype").value,
                degree: r.querySelector(".degree").value,
                count: r.querySelector(".count").value
            });
        });
    }

    if (type.value === "internal") {
        data.activity = activity.value;
        data.participants = int_participants.value;
    }

    output.textContent = JSON.stringify(data, null, 2);
}

</script>

</body>
</html>
